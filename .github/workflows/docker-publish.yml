name: Build and publish WebGL Docker image

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout main (Dockerfile)
        uses: actions/checkout@v4

      - name: Checkout WebGL build (gh-pages)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: webgl-build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/n0w3rn/schnapskarten:latest
